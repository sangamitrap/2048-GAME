<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048 Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: #faf8ef;
      margin: 0;
      padding: 20px;
    }
    h1 {
      color: #776e65;
      margin-bottom: 10px;
    }
    #score {
      font-size: 24px;
      color: #776e65;
      margin-bottom: 20px;
    }
    #game-container {
      background-color: #bbada0;
      padding: 15px;
      border-radius: 10px;
      display: grid;
      grid-template-columns: repeat(4, 100px);
      grid-gap: 10px;
    }
    .tile {
      width: 100px;
      height: 100px;
      background-color: #cdc1b4;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 32px;
      font-weight: bold;
      color: #776e65;
      border-radius: 5px;
      transition: all 0.1s ease-in-out;
    }
    .tile-2 { background-color: #eee4da; }
    .tile-4 { background-color: #ede0c8; }
    .tile-8 { background-color: #f2b179; }
    .tile-16 { background-color: #f59563; }
    .tile-32 { background-color: #f67c5f; }
    .tile-64 { background-color: #f65e3b; }
    .tile-128 { background-color: #edcf72; }
    .tile-256 { background-color: #edcc61; }
    .tile-512 { background-color: #edc850; }
    .tile-1024 { background-color: #edc53f; }
    .tile-2048 { background-color: #edc22e; }
    #restart-btn {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 18px;
      background-color: #8f7a66;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    #restart-btn:hover {
      background-color: #776e65;
    }
    #error-message {
      color: red;
      margin-top: 20px;
      display: none;
    }
  </style>
</head>
<body>
  <h1>2048</h1>
  <div id="score">Score: 0</div>
  <div id="game-container"></div>
  <button id="restart-btn">Restart</button>
  <div id="error-message"></div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
  <script>
    let pyodide;
    let game;

    async function loadPyodideAndGame() {
      try {
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        await pyodide.runPythonAsync(`
          import micropip
          await micropip.install('numpy')
        `);

        // Python game logic
        await pyodide.runPythonAsync(`
import numpy as np
import random
import platform

class Game2048:
    def __init__(self):
        self.size = 4
        self.board = np.zeros((self.size, self.size), dtype=int)
        self.score = 0
        self.game_over = False
        self.add_random_tile()
        self.add_random_tile()

    def add_random_tile(self):
        empty = [(i, j) for i in range(self.size) for j in range(self.size) if self.board[i, j] == 0]
        if empty:
            i, j = random.choice(empty)
            self.board[i, j] = 2 if random.random() < 0.9 else 4

    def slide_left(self, row):
        non_zero = [x for x in row if x != 0]
        i = 0
        while i < len(non_zero) - 1:
            if non_zero[i] == non_zero[i + 1]:
                non_zero[i] *= 2
                self.score += non_zero[i]
                non_zero.pop(i + 1)
            i += 1
        return non_zero + [0] * (self.size - len(non_zero))

    def move_left(self):
        moved = False
        new_board = np.copy(self.board)
        for i in range(self.size):
            new_row = self.slide_left(self.board[i, :].tolist())
            new_board[i, :] = new_row
            if not np.array_equal(new_board[i, :], self.board[i, :]):
                moved = True
        if moved:
            self.board = new_board
            self.add_random_tile()
        return moved

    def move_right(self):
        self.board = np.fliplr(self.board)
        moved = self.move_left()
        self.board = np.fliplr(self.board)
        return moved

    def move_up(self):
        self.board = np.transpose(self.board)
        moved = self.move_left()
        self.board = np.transpose(self.board)
        return moved

    def move_down(self):
        self.board = np.transpose(self.board)
        self.board = np.fliplr(self.board)
        moved = self.move_left()
        self.board = np.fliplr(self.board)
        self.board = np.transpose(self.board)
        return moved

    def check_game_over(self):
        if np.any(self.board == 0):
            return False
        for i in range(self.size):
            for j in range(self.size - 1):
                if self.board[i, j] == self.board[i, j + 1]:
                    return False
            for j in range(self.size - 1):
                if self.board[j, i] == self.board[j + 1, i]:
                    return False
        self.game_over = True
        return True

    def get_state(self):
        return {
            'board': self.board.tolist(),
            'score': self.score,
            'game_over': self.game_over
        }

    def reset(self):
        self.__init__()

game = Game2048()

async def main():
    while True:
        await asyncio.sleep(0.1)
        `);

        game = pyodide.globals.get('game');
        initializeBoard();
        updateBoard();
      } catch (error) {
        console.error('Error loading Pyodide or Python code:', error);
        const errorDiv = document.getElementById('error-message');
        errorDiv.style.display = 'block';
        errorDiv.textContent = 'Failed to load the game. Please check your internet connection and try again.';
      }
    }

    function initializeBoard() {
      const container = document.getElementById('game-container');
      container.innerHTML = '';
      for (let i = 0; i < 16; i++) {
        const tile = document.createElement('div');
        tile.classList.add('tile');
        container.appendChild(tile);
      }
    }

    function updateBoard() {
      try {
        const state = game.get_state().toJs();
        const board = state.get('board');
        const score = state.get('score');
        const gameOver = state.get('game_over');
        document.getElementById('score').textContent = `Score: ${score}`;
        const tiles = document.querySelectorAll('.tile');
        let tileIndex = 0;
        for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
            const value = board[i][j];
            const tile = tiles[tileIndex];
            tile.textContent = value === 0 ? '' : value;
            tile.className = 'tile';
            if (value > 0) {
              tile.classList.add(`tile-${value}`);
            }
            tileIndex++;
          }
        }
        if (gameOver) {
          alert('Game Over! Press Restart to play again.');
        }
      } catch (error) {
        console.error('Error updating board:', error);
      }
    }

    document.addEventListener('keydown', (event) => {
      try {
        let moved = false;
        switch (event.key) {
          case 'ArrowLeft':
            moved = game.move_left();
            break;
          case 'ArrowRight':
            moved = game.move_right();
            break;
          case 'ArrowUp':
            moved = game.move_up();
            break;
          case 'ArrowDown':
            moved = game.move_down();
            break;
        }
        if (moved) {
          game.check_game_over();
          updateBoard();
        }
      } catch (error) {
        console.error('Error handling keypress:', error);
      }
    });

    document.getElementById('restart-btn').addEventListener('click', () => {
      try {
        game.reset();
        updateBoard();
      } catch (error) {
        console.error('Error resetting game:', error);
      }
    });

    loadPyodideAndGame();
  </script>
</body>
</html>
